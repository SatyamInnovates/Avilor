<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile &#x2014; Avilor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .glow-btn:hover { box-shadow: 0 0 28px #a855f7, 0 0 56px #a855f760; }
        .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        .avatar-float { animation: float 3.5s ease-in-out infinite; }

        @keyframes ringPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.5), 0 0 0 6px rgba(168,85,247,0.15); }
            50%      { box-shadow: 0 0 0 6px rgba(168,85,247,0.3), 0 0 0 14px rgba(168,85,247,0.05); }
        }
        .ring-pulse { animation: ringPulse 3.5s ease-in-out infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in   { animation: fadeIn 0.4s 0.3s ease both; }
        .fade-in-2 { animation: fadeIn 0.4s 0.4s ease both; }

        @keyframes popBounce {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }
        .stat-1 { animation: popBounce 0.4s 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
        .stat-2 { animation: popBounce 0.4s 0.52s cubic-bezier(0.34,1.56,0.64,1) both; }
        .stat-3 { animation: popBounce 0.4s 0.64s cubic-bezier(0.34,1.56,0.64,1) both; }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-24px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .row-1 { animation: slideLeft 0.35s 0.55s ease both; }
        .row-2 { animation: slideLeft 0.35s 0.65s ease both; }
        .row-3 { animation: slideLeft 0.35s 0.75s ease both; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .actions { animation: slideUpFade 0.4s 0.8s ease both; }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">

    <div class="blob w-40 md:w-[500px] h-40 md:h-[500px] bg-purple-900/20 top-[-4rem] left-[-4rem]"></div>
    <div class="blob w-28 md:w-80 h-28 md:h-80 bg-purple-800/15 bottom-0 right-[-2rem]"></div>

    {% include 'navbar.html' %}

    <div class="relative z-10 max-w-2xl mx-auto px-4 py-16">

        <div class="flex flex-col items-center text-center mb-10">
            <div class="avatar-float ring-pulse w-20 h-20 rounded-full bg-gradient-to-br from-purple-600 to-purple-400 flex items-center justify-center text-3xl font-extrabold mb-4">
                {{ username[0] | upper if username else 'U' }}
            </div>
            <h1 class="text-3xl font-extrabold fade-in">{{ username }}</h1>
            <p class="text-gray-400 text-sm mt-1 fade-in-2">{{ user_email }}</p>
        </div>

        <div class="grid grid-cols-3 gap-2 md:gap-4 mb-8">
            <div class="stat-1 bg-gray-900 border border-gray-800 rounded-2xl p-3 md:p-4 text-center hover:border-purple-800 transition cursor-default">
                <p class="text-xl md:text-2xl font-extrabold text-purple-400">0</p>
                <p class="text-gray-500 text-xs mt-1">Days streak</p>
            </div>
            <div class="stat-2 bg-gray-900 border border-gray-800 rounded-2xl p-3 md:p-4 text-center hover:border-purple-800 transition cursor-default">
                <p class="text-xl md:text-2xl font-extrabold text-purple-400">0</p>
                <p class="text-gray-500 text-xs mt-1">Tasks done</p>
            </div>
            <div class="stat-3 bg-gray-900 border border-gray-800 rounded-2xl p-3 md:p-4 text-center hover:border-purple-800 transition cursor-default">
                <p class="text-xl md:text-2xl font-extrabold text-purple-400">0%</p>
                <p class="text-gray-500 text-xs mt-1">Roadmap</p>
            </div>
        </div>

        <div class="bg-gray-900/80 backdrop-blur-sm rounded-2xl border border-gray-800 p-6 mb-6">
            <h2 class="text-xs text-gray-500 font-semibold uppercase tracking-widest mb-5">Account Details</h2>
            <div class="flex flex-col">
                <div class="row-1 flex items-center justify-between py-3.5 border-b border-gray-800/80">
                    <span class="text-gray-400 text-sm">Email</span>
                    <span class="text-white text-sm font-semibold">{{ user_email }}</span>
                </div>
                <div class="row-2 flex items-center justify-between py-3.5 border-b border-gray-800/80">
                    <span class="text-gray-400 text-sm">Username</span>
                    <span class="text-white text-sm font-semibold">{{ username }}</span>
                </div>
                <div class="row-3 flex items-center justify-between py-3.5">
                    <span class="text-gray-400 text-sm">Member since</span>
                    <span class="text-white text-sm font-semibold">June 2026</span>
                </div>
            </div>
        </div>

        <div class="actions flex gap-3">
            <button class="glow-btn flex-1 bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-bold text-sm transition active:scale-95">
                Edit Profile
            </button>
            <a href="/" class="flex-1">
                <button class="w-full border border-gray-700 hover:border-purple-600 text-gray-400 hover:text-purple-400 py-3 rounded-xl font-bold text-sm transition active:scale-95">
                    &#x2192; Home
                </button>
            </a>
        </div>

    </div>
</body>
</html>
